services:
  db:
    image: postgres:16
    container_name: jobtracker-db
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: jobtracker-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
  app:
    build: .
    container_name: jobtracker-app
    depends_on:
      - db
      - mailhog
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/jobtracker
      DB_USERNAME: jobtracker
      DB_PASSWORD: jobtracker
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_SMTP_AUTH: "false"
      MAIL_SMTP_STARTTLS: "false"
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data: